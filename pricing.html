<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing - IllusionHost</title>

  <link rel="stylesheet" href="preorder.css">
  <script src="pricing.js" defer></script>
</head>

<body>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <img src="illusion.png" class="left-img">

    <div class="left-text">
      <h2>Payment Options</h2>
      <p>
        Choose a payment method below. All payments are manually verified.
        Merchant payments require a reference number.
      </p>

      <div class="sponsors">
        <img src="campus1.png">
        <img src="airtel.png">
        <img src="merchant.png">
      </div>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">

    <!-- HEADER -->
    <header class="right-header">
      <h1 class="logo">IllusionHost</h1>

      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="documentation.html">Docs</a>
        <a href="pricing.html">Pricing</a>
        <a href="support.html">Contact</a>
      </nav>
    </header>

    <div class="bg-right"></div>

    <!-- PAYMENT TILE -->
    <div class="preorder-tile">

      <h2>Make Payment</h2>

      <!-- METHOD BUTTONS -->
      <div class="payment-methods">
        <button onclick="selectMethod('mtn')" class="sharp-btn">MTN</button>
        <button onclick="selectMethod('airtel')" class="sharp-btn">Airtel</button>
        <button onclick="selectMethod('merchant')" class="sharp-btn">Merchant</button>
      </div>

      <!-- DYNAMIC AREA -->
      <div id="payment-area"></div>

    </div>

  </div>

</div>

</body>
</html>
