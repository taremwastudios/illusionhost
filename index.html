<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="icon.png">
  <title>IllusionHost</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">

  <!-- LEFT (Vertical Slider) -->
  <div class="left">
    <div class="slider-track">
      <img src="icons.png">
      <img src="campus1.png">
      <img src="image.jpg">
      <img src="phantom.jpeg">
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <!-- Background Video -->
    <video autoplay muted loop class="bg-video">
      <source src="bg.mp4" type="video/mp4">
    </video>

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- Auth Box -->
    <div class="auth-box">
      <h2 id="form-title">Login</h2>

      <!-- LOGIN -->
      <div id="login-form">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button type="button" id="login-btn">
          <span class="btn-label">Login</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </div>

      <!-- REGISTER -->
      <div id="register-form" style="display:none;">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button type="button" id="register-btn">
          <span class="btn-label">Register</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </div>

      <p id="auth-status" role="status" aria-live="polite"></p>

      <!-- TOGGLE -->
      <p>
        <span id="toggle-message">Don't have an account?</span>
        <span id="toggle-btn">Register</span>
      </p>

      <!-- SOCIAL SIGN-IN -->
      <div class="social-login">
        <p>Or sign in with</p>
        <div class="social-buttons">
          <button type="button" id="github-login" class="social-btn">GitHub</button>
          <button type="button" id="google-login" class="social-btn">Google</button>
          <button type="button" id="microsoft-login" class="social-btn">Microsoft</button>
        </div>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
