<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="icon.png">
  <title>IllusionHost</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

<div class="container">

  <div class="left">
    <div class="slider-track">
      <img src="icons.png">
      <img src="campus1.png">
      <img src="image.jpg">
      <img src="phantom.jpeg">
    </div>
  </div>

  <div class="right">
    <video autoplay muted loop class="bg-video">
      <source src="bg.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="auth-box">
      <h2 id="form-title">Login</h2>

      <div id="login-form">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button type="button" id="login-btn">
          <span class="btn-label">Login</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </div>

      <div id="register-form" style="display:none;">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button type="button" id="register-btn">
          <span class="btn-label">Register</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </div>

      <p id="auth-status" role="status" aria-live="polite"></p>
      <div class="cf-turnstile" data-sitekey="0x4AAAAAAC8CNYPPXMBuAl-p"></div>

      <p>
        <span id="toggle-message">Don't have an account?</span>
        <span id="toggle-btn">Register</span>
      </p>

      <div class="social-login">
        <p>Or sign in with</p>
        <div class="social-buttons">
          <button type="button" id="github-login" class="social-btn" aria-label="Sign in with GitHub" title="Sign in with GitHub">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#181717" d="M12 .5A12 12 0 0 0 8.2 23.9c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.4-4-1.4-.5-1.4-1.3-1.8-1.3-1.8-1-.7.1-.7.1-.7 1.1.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.7.4-1.3.7-1.6-2.7-.3-5.5-1.4-5.5-6.1 0-1.3.4-2.3 1.1-3.2-.1-.3-.5-1.5.1-3.1 0 0 .9-.3 3.2 1.2a10.7 10.7 0 0 1 5.8 0c2.2-1.5 3.2-1.2 3.2-1.2.6 1.6.2 2.8.1 3.1.7.9 1.1 1.9 1.1 3.2 0 4.8-2.8 5.8-5.5 6.1.4.4.8 1.1.8 2.2v3.2c0 .4.2.7.8.6A12 12 0 0 0 12 .5Z"/>
            </svg>
          </button>
          <button type="button" id="google-login" class="social-btn" aria-label="Sign in with Google" title="Sign in with Google">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#4285F4" d="M21.8 12.2c0-.7-.1-1.3-.2-1.9H12v3.7h5.5a4.7 4.7 0 0 1-2 3.1v2.6h3.2c1.9-1.7 3.1-4.3 3.1-7.5Z"/>
              <path fill="#34A853" d="M12 22c2.8 0 5.2-.9 6.9-2.4l-3.2-2.6a6.2 6.2 0 0 1-9.2-3.3H3.2v2.7A10 10 0 0 0 12 22Z"/>
              <path fill="#FBBC05" d="M6.5 13.7a6 6 0 0 1 0-3.5V7.5H3.2a10 10 0 0 0 0 9l3.3-2.8Z"/>
              <path fill="#EA4335" d="M12 6a5.5 5.5 0 0 1 3.9 1.5l2.9-2.9A10 10 0 0 0 3.2 7.5l3.3 2.7A6 6 0 0 1 12 6Z"/>
            </svg>
          </button>
          <button type="button" id="microsoft-login" class="social-btn" aria-label="Sign in with Microsoft" title="Sign in with Microsoft">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="2" y="2" width="9" height="9" fill="#F25022"/>
              <rect x="13" y="2" width="9" height="9" fill="#7FBA00"/>
              <rect x="2" y="13" width="9" height="9" fill="#00A4EF"/>
              <rect x="13" y="13" width="9" height="9" fill="#FFB900"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
