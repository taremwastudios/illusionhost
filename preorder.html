<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preorder Subdomain - IllusionHost</title>
  <link rel="stylesheet" href="preorder.css">
  <link rel="icon" type="image/png" href="icon.png">
  <script type="text/javascript" src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <script type="text/javascript">
    (function(){ emailjs.init('iNXpiVBv9y8gZ3XJo'); })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="preorder.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="left">
      <img src="illusion.png" alt="Subdomain Provider" class="left-img">
      <div class="left-text">
        <h2>IllusionHost Subdomains</h2>
        <p>...existing long paragraph...</p>
        <div class="sponsors">
          <img src="cloudflare.svg" alt="Cloudflare">
          <img src="digitalocean.svg" alt="Digital Ocean">
          <img src="koyeb.svg" alt="Koyeb">
        </div>
      </div>
    </div>

    <div class="right">
      <div class="bg-right"></div>
      <div class="top-header">
        <a href="preorder.html">Preorder</a>
        <a href="track.html">Track</a>
        <a href="documentation.html">Docs</a>
      </div>

      <div class="preorder-tile">
        <h2>Preorder Your Subdomain</h2>
        <form id="preorder-form" action="https://formspree.io/f/mqegwgol" method="POST">
          <input type="hidden" name="email" id="email">
          <input type="text" name="subdomain" id="subdomain" placeholder="e.g. system.illusionhost.net" required>
          <input type="hidden" name="order_id" id="order_id">
          <button type="submit" id="preorder-btn">Preorder</button>
        </form>
        <p id="counter">0 people already preordered!</p>
      </div>

      <p class="coming-soon">Our service is coming soon! ...</p>

      <div class="travelling-icons">
        <!-- existing logos -->
      </div>

      <div class="footer-links">
        <a href="privacypolicy.html">Privacy Policy</a>
        <a href="disclaimer.html">Disclaimer</a>
        <a href="termsofservice.html">Terms of Service</a>
        <a href="documentation.html">Documentation</a>
      </div>
    </div>
  </div>
</body>
</html>
